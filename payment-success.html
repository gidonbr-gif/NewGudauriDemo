<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תשלום התקבל — Gudauri Helper</title>
  <meta name="robots" content="noindex" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #020617; --electric: #0EA5E9; --snow: #F1F5F9;
      --slate-400: #94A3B8; --glass-border: rgba(255,255,255,0.08);
    }
    body {
      background: var(--navy); color: var(--snow);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 48px 36px; max-width: 480px; width: 100%;
    }
    .icon { font-size: 3.5rem; margin-bottom: 20px; }
    h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 10px; }
    .sub { color: var(--slate-400); font-size: 1rem; line-height: 1.6; margin-bottom: 28px; }
    .details {
      background: rgba(14,165,233,0.08); border: 1px solid rgba(14,165,233,0.2);
      border-radius: 12px; padding: 16px 20px; margin-bottom: 28px;
      font-size: 0.9375rem; line-height: 1.8; text-align: right;
    }
    .details strong { color: var(--electric); }
    .wa-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      color: white; text-decoration: none; font-size: 1rem; font-weight: 700;
      padding: 13px 28px; border-radius: 12px;
      transition: opacity .2s, transform .2s;
    }
    .wa-btn:hover { opacity: .91; transform: translateY(-2px); }
    .back { margin-top: 18px; font-size: 0.875rem; color: var(--slate-400); }
    .back a { color: var(--electric); text-decoration: none; }
  </style>
</head>
<body>
  <!-- iframe-break: if loaded inside iframe, break out to top -->
  <script>if (window !== window.top) { window.top.location.href = window.location.href; }</script>

  <div class="card">
    <div class="icon">✅</div>
    <h1>תשלום התקבל בהצלחה!</h1>
    <p class="sub">ההזמנה שלך נרשמה. ניצור איתך קשר תוך שעות לאישור סופי ופרטים.</p>

    <div class="details" id="bookingDetails">
      טוען פרטי הזמנה...
    </div>

    <a
      id="waBtn"
      href="https://wa.me/972557790955?text=%D7%A9%D7%9C%D7%95%D7%9D%2C%20%D7%A9%D7%99%D7%9C%D7%9E%D7%AA%D7%99%20%D7%9C%D7%94%D7%96%D7%9E%D7%A0%D7%AA%20%D7%93%D7%99%D7%A8%D7%94%20%D7%91%D7%92%D7%95%D7%93%D7%90%D7%95%D7%A8%D7%99"
      target="_blank" rel="noopener noreferrer"
      class="wa-btn"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      אשר את ההזמנה בוואטסאפ
    </a>

    <p class="back"><a href="lina.html">← חזרה לדף הלינה</a></p>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var apt    = params.get('apt') || '';
    var nights = params.get('nights') || '';
    var ref    = params.get('ref') || '';

    var aptNames = { atrium: 'דירת Atrium — ניו גודאורי', suits: 'דירת Suits — ניו גודאורי' };
    var aptName  = aptNames[apt] || 'דירה בגודאורי';

    var detailsEl = document.getElementById('bookingDetails');
    if (apt && nights) {
      detailsEl.innerHTML =
        '<strong>דירה:</strong> ' + aptName + '<br>' +
        '<strong>לילות:</strong> ' + nights + '<br>' +
        '<strong>מספר אסמכתא:</strong> ' + (ref || '—');
    } else {
      detailsEl.textContent = 'ההזמנה נרשמה בהצלחה. נפנה אליך בקרוב.';
    }

    var waText = encodeURIComponent(
      'שלום, שילמתי להזמנת ' + aptName + ' (' + nights + ' לילות). אסמכתא: ' + (ref || '—')
    );
    document.getElementById('waBtn').href = 'https://wa.me/972557790955?text=' + waText;
  </script>
</body>
</html>
