<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תשלום התקבל — Gudauri Helper</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/images/gudauri-ski-village.jpg" type="image/jpeg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #020617; --electric: #0EA5E9; --snow: #F1F5F9;
      --slate-400: #94A3B8; --glass-border: rgba(255,255,255,0.08);
    }
    body {
      background: var(--navy); color: var(--snow);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
      text-align: center;
    }
    html[dir="ltr"] body { direction: ltr; text-align: center; }
    .card {
      background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 48px 36px; max-width: 480px; width: 100%;
    }
    .icon { font-size: 3.5rem; margin-bottom: 20px; }
    h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 10px; }
    .sub { color: var(--slate-400); font-size: 1rem; line-height: 1.6; margin-bottom: 28px; }
    .details {
      background: rgba(14,165,233,0.08); border: 1px solid rgba(14,165,233,0.2);
      border-radius: 12px; padding: 16px 20px; margin-bottom: 28px;
      font-size: 0.9375rem; line-height: 1.8; text-align: right;
    }
    html[dir="ltr"] .details { text-align: left; }
    .details strong { color: var(--electric); }
    .wa-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      color: white; text-decoration: none; font-size: 1rem; font-weight: 700;
      padding: 13px 28px; border-radius: 12px;
      transition: opacity .2s, transform .2s;
    }
    .wa-btn:hover { opacity: .91; transform: translateY(-2px); }
    .back { margin-top: 18px; font-size: 0.875rem; color: var(--slate-400); }
    .back a { color: var(--electric); text-decoration: none; }
  </style>
</head>
<body>
  <!-- iframe-break: if loaded inside iframe, break out to top -->
  <script>if (window !== window.top) { window.top.location.href = window.location.href; }</script>

  <div class="card">
    <div class="icon">✅</div>
    <h1 id="ps-title">תשלום התקבל בהצלחה!</h1>
    <p class="sub" id="ps-sub">ההזמנה שלך נרשמה. ניצור איתך קשר תוך שעות לאישור סופי ופרטים.</p>

    <div class="details" id="bookingDetails">
      <span id="ps-loading">טוען פרטי הזמנה...</span>
    </div>

    <a
      id="waBtn"
      href="https://wa.me/972557790955?text=%D7%A9%D7%9C%D7%95%D7%9D%2C%20%D7%A9%D7%99%D7%9C%D7%9E%D7%AA%D7%99%20%D7%9C%D7%94%D7%96%D7%9E%D7%A0%D7%AA%20%D7%93%D7%99%D7%A8%D7%94%20%D7%91%D7%92%D7%95%D7%93%D7%90%D7%95%D7%A8%D7%99"
      target="_blank" rel="noopener noreferrer"
      class="wa-btn"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.112.549 4.091 1.508 5.815L.057 23.256a.75.75 0 00.921.921l5.462-1.445A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.93 0-3.733-.524-5.282-1.435l-.378-.225-3.922 1.037 1.05-3.83-.247-.395A9.938 9.938 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
      <span id="ps-wa-btn">אשר את ההזמנה בוואטסאפ</span>
    </a>

    <p class="back" id="backLink"></p>
  </div>

  <script>
    var PS = {
      he: {
        dir: 'rtl', lang: 'he',
        title: 'תשלום התקבל בהצלחה!',
        sub: 'ההזמנה שלך נרשמה. ניצור איתך קשר תוך שעות לאישור סופי ופרטים.',
        loading: 'טוען פרטי הזמנה...',
        waBtn: 'אשר את ההזמנה בוואטסאפ',
        backLina: '← חזרה לדף הלינה',
        backEquip: '← חזרה לדף הציוד',
        equipName: 'השכרת ציוד סקי — ניו גודאורי',
        rentDays: 'ימי השכרה',
        totalOrder: 'סה״כ הזמנה',
        deposit: 'שולמה מקדמה של',
        refNum: 'מספר אסמכתא',
        apt_atrium: 'דירת Atrium — ניו גודאורי',
        apt_suits: 'דירת Suits — ניו גודאורי',
        apt_generic: 'דירה בגודאורי',
        aptLabel: 'דירה',
        nightsLabel: 'לילות',
        registered: 'ההזמנה נרשמה בהצלחה. נפנה אליך בקרוב.',
        waMsg_equip: 'שלום, שילמתי מקדמה להזמנת ציוד סקי בגודאורי',
        waMsg_apt: 'שלום, שילמתי להזמנת',
        waMsg_nights: 'לילות',
        waMsg_ref: 'אסמכתא'
      },
      en: {
        dir: 'ltr', lang: 'en',
        title: 'Payment Received Successfully!',
        sub: 'Your booking has been registered. We will contact you within hours for final confirmation and details.',
        loading: 'Loading booking details...',
        waBtn: 'Confirm Booking on WhatsApp',
        backLina: '← Back to Accommodation',
        backEquip: '← Back to Equipment Page',
        equipName: 'Ski Equipment Rental — New Gudauri',
        rentDays: 'Rental Days',
        totalOrder: 'Order Total',
        deposit: 'Deposit paid',
        refNum: 'Reference Number',
        apt_atrium: 'Atrium Apartment — New Gudauri',
        apt_suits: 'Suits Apartment — New Gudauri',
        apt_generic: 'Apartment in Gudauri',
        aptLabel: 'Apartment',
        nightsLabel: 'Nights',
        registered: 'Booking registered successfully. We will get back to you shortly.',
        waMsg_equip: 'Hi, I paid a deposit for ski equipment rental in Gudauri',
        waMsg_apt: 'Hi, I paid for',
        waMsg_nights: 'nights',
        waMsg_ref: 'Ref'
      },
      ru: {
        dir: 'ltr', lang: 'ru',
        title: 'Платёж успешно получен!',
        sub: 'Ваше бронирование зарегистрировано. Мы свяжемся с вами в течение нескольких часов для подтверждения.',
        loading: 'Загрузка данных бронирования...',
        waBtn: 'Подтвердить бронирование в WhatsApp',
        backLina: '← Вернуться к жилью',
        backEquip: '← Вернуться на страницу оборудования',
        equipName: 'Аренда лыжного снаряжения — New Gudauri',
        rentDays: 'Дней аренды',
        totalOrder: 'Итого',
        deposit: 'Задаток оплачен',
        refNum: 'Номер заказа',
        apt_atrium: 'Апартаменты Atrium — New Gudauri',
        apt_suits: 'Апартаменты Suits — New Gudauri',
        apt_generic: 'Апартаменты в Гудаури',
        aptLabel: 'Апартаменты',
        nightsLabel: 'Ночей',
        registered: 'Бронирование успешно зарегистрировано. Мы скоро свяжемся с вами.',
        waMsg_equip: 'Здравствуйте, я оплатил задаток за аренду лыжного снаряжения в Гудаури',
        waMsg_apt: 'Здравствуйте, я оплатил',
        waMsg_nights: 'ночей',
        waMsg_ref: 'Заказ'
      },
      ge: {
        dir: 'ltr', lang: 'ka',
        title: 'გადახდა წარმატებით მიღებულია!',
        sub: 'თქვენი ჯავშანი დარეგისტრირებულია. საბოლოო დადასტურებისთვის დაგიკავშირდებით რამდენიმე საათში.',
        loading: 'ჯავშნის დეტალების ჩატვირთვა...',
        waBtn: 'WhatsApp-ით ჯავშნის დადასტურება',
        backLina: '← განთავსებაზე დაბრუნება',
        backEquip: '← აღჭურვილობის გვერდზე დაბრუნება',
        equipName: 'სათხილამურო აღჭურვილობის გაქირავება — New Gudauri',
        rentDays: 'გაქირავების დღეები',
        totalOrder: 'სულ',
        deposit: 'ანაბარი გადახდილია',
        refNum: 'შეკვეთის ნომერი',
        apt_atrium: 'Atrium აპარტამენტი — New Gudauri',
        apt_suits: 'Suits აპარტამენტი — New Gudauri',
        apt_generic: 'აპარტამენტი გუდაურში',
        aptLabel: 'აპარტამენტი',
        nightsLabel: 'ღამე',
        registered: 'ჯავშანი წარმატებით დარეგისტრირდა. მალე დაგიკავშირდებით.',
        waMsg_equip: 'გამარჯობა, გადავიხადე ანაბარი სათხილამურო აღჭურვილობის გუდაურში გაქირავებისთვის',
        waMsg_apt: 'გამარჯობა, გადავიხადე',
        waMsg_nights: 'ღამე',
        waMsg_ref: 'შეკვეთა'
      }
    };

    // detect language from URL param or localStorage
    var urlLang = new URLSearchParams(window.location.search).get('lang');
    var savedLang = localStorage.getItem('gudauri-lang');
    var lang = (urlLang && PS[urlLang]) ? urlLang
             : (savedLang && PS[savedLang]) ? savedLang
             : 'he';
    var T = PS[lang];

    // apply direction
    document.documentElement.lang = T.lang;
    document.documentElement.dir = T.dir;

    // apply static text
    document.getElementById('ps-title').textContent = T.title;
    document.getElementById('ps-sub').textContent = T.sub;
    document.getElementById('ps-loading').textContent = T.loading;
    document.getElementById('ps-wa-btn').textContent = T.waBtn;

    // build booking details
    var params = new URLSearchParams(window.location.search);
    var type   = params.get('type') || '';
    var apt    = params.get('apt') || '';
    var nights = params.get('nights') || '';
    var days   = params.get('days') || '';
    var total  = params.get('total') || '';
    var ref    = params.get('ref') || '';

    var detailsEl = document.getElementById('bookingDetails');
    var waText;

    if (type === 'equipment') {
      var deposit = total ? Math.ceil(parseFloat(total) * 0.10) : '';
      detailsEl.innerHTML =
        '<strong>' + T.equipName + '</strong><br>' +
        (days  ? '<strong>' + T.rentDays + ':</strong> ' + days + '<br>' : '') +
        (total ? '<strong>' + T.totalOrder + ':</strong> $' + total + ' (' + T.deposit + ' $' + deposit + ')<br>' : '') +
        '<strong>' + T.refNum + ':</strong> ' + (ref || '—');
      waText = encodeURIComponent(T.waMsg_equip + ' (' + (days || '?') + ' ' + T.rentDays.toLowerCase() + '). ' + T.waMsg_ref + ': ' + (ref || '—'));
    } else {
      var aptKey = apt === 'atrium' ? 'apt_atrium' : apt === 'suits' ? 'apt_suits' : 'apt_generic';
      var aptName = T[aptKey];
      if (apt && nights) {
        detailsEl.innerHTML =
          '<strong>' + T.aptLabel + ':</strong> ' + aptName + '<br>' +
          '<strong>' + T.nightsLabel + ':</strong> ' + nights + '<br>' +
          '<strong>' + T.refNum + ':</strong> ' + (ref || '—');
      } else {
        detailsEl.textContent = T.registered;
      }
      waText = encodeURIComponent(T.waMsg_apt + ' ' + aptName + ' (' + nights + ' ' + T.waMsg_nights + '). ' + T.waMsg_ref + ': ' + (ref || '—'));
    }

    document.getElementById('waBtn').href = 'https://wa.me/972557790955?text=' + waText;

    // back link
    var backEl = document.getElementById('backLink');
    if (type === 'equipment') {
      backEl.innerHTML = '<a href="equipment.html' + (lang !== 'he' ? '?lang=' + lang : '') + '">' + T.backEquip + '</a>';
    } else {
      backEl.innerHTML = '<a href="lina.html' + (lang !== 'he' ? '?lang=' + lang : '') + '">' + T.backLina + '</a>';
    }
  </script>
</body>
</html>
